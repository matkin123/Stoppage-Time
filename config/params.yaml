# Tunable parameters. Every change here should get an ADR entry in docs/decisions.md.

bip:
  # Gap method (s03): a possession's last event -> next restart is "dead".
  # restart_play_patterns are the play_pattern values that mark the ball coming back in.
  restart_play_patterns:
    - "From Throw In"
    - "From Corner"
    - "From Free Kick"
    - "From Goal Kick"
    - "From Kick Off"
    - "From Keeper"
  # Minimum gap (seconds) before a restart-boundary interval is counted as dead time.
  min_dead_gap_s: 0.0
  # Max gap (seconds) the ball can be "in play" with zero recorded events. Any inter-
  # event gap >= this is dead even without a restart pattern (injury / VAR / slow restart
  # within a possession). In active play StatsBomb logs an event every few seconds, so a
  # 20s+ silent gap is not live. Tuned to hit the s03 calibration gate (WC2022 full-match
  # BIP within +/-90s of Opta 58:04): G=20s -> 3460s, 24s under target.
  max_live_gap_s: 20.0
  # Calibration target (Opta published WC2022 pooled ball-in-play, mm:ss -> seconds).
  calibration_target_s: 3484   # 58:04
  calibration_tolerance_s: 90
  inplay_share_sane_lo: 0.55
  inplay_share_sane_hi: 0.60

silent:
  # Marker-gated silent term for the s05 true-stoppage estimator (IMPL-3). This is NOT used
  # by s03/bip.py -- bip.py stays the validated duration rule (ADR-0014/0015). A >=
  # min_silent_gap_s non-restart gap is credited as ADDABLE stoppage only when its lead-edge
  # event carries one of these out-of-play markers; unmarked silent gaps are dropped (a flat
  # ~8.4 min/match non-addable baseline -- crediting them is the over-count).
  min_silent_gap_s: 20.0
  out_of_play_pass_outcomes:
    - "Out"
    - "Injury Clearance"
  out_of_play_shot_outcomes:
    - "Off T"
    - "Saved Off Target"
    - "Wayward"
    - "Blocked"
    - "Goal"
  out_of_play_types:
    - "Foul Committed"
    - "Offside"
    - "Bad Behaviour"
    - "Substitution"
    - "Player Off"
    - "Injury Stoppage"
    - "Referee Ball-Drop"
    - "Half End"
  gk_hold_types:
    - "Collected"
    - "Smother"
    - "Pick-up"
  # Residual-silent constant: the irreducible unmarked-but-addable remainder left after
  # marker-gating, FIT ON 2018 (mean Nate `expected` - mean(lower_bound + marked_silent)
  # over the 32 WC2018 matches = 13.160 - 12.757 min). RE-FIT in IMPL-5 (ADR-0017): adding
  # restart_excess to lower_bound raised the mean, shrinking the residual 114.0 -> 24.2s.
  # FROZEN; applied per-match to all six tournaments (POST has no ground truth to fit on).
  residual_silent_s: 24.2
  # Estimator validation residuals on the 32 WC2018 matches (full-match totals vs Nate
  # `expected`), re-fit in IMPL-5 (ADR-0017) after adding restart_excess (r 0.768->0.825,
  # MAE 2.75->2.44). IMPL-4 uses estimator_mae_min as the per-match sigma when propagating
  # estimator uncertainty into the X% confidence band.
  estimator_pearson_r: 0.825
  estimator_mae_min: 2.44

phases:
  # Stoppage threshold in WITHIN-PERIOD seconds: period_s >= 2700 means past 45:00 in a
  # half (the 45' mark in P1, the 90' mark in P2). Keyed off period_s, not the cumulative
  # clock, so a long first half doesn't bleed the elapsed clock past 45:00 prematurely.
  half_stoppage_s: 2700
  bucket_minutes: 10

incident:
  # s05 lower-bound dead-time component windows are bounded to avoid absurd attributions.
  max_celebration_s: 180
  max_sub_s: 90
  max_card_s: 120
  max_injury_s: 600
  # Restart time-wasting allowances (IMPL-5, ADR-0017): Nate Silver's "how long a routine
  # restart SHOULD take". For each routine restart-boundary gap we credit only the EXCESS
  # over the allowance -- interval [last_event + allowance, restart] -- as addable stoppage.
  # This is identifiable (restart-tagged) dead time, so it folds into lower_bound_s via the
  # union-then-intersect machinery (deduped against the card/sub/injury windows, clipped to
  # s03 dead). From Kick Off (celebration) and From Keeper (keeper distribution, largely
  # live) are deliberately EXCLUDED. FIT/FROZEN on 2018, applied to all six tournaments.
  restart_normal_s:
    "From Throw In": 20.0
    "From Goal Kick": 30.0
    "From Corner": 45.0
    "From Free Kick": 60.0
  # (no longer consumed by s08 since IMPL-4 replaced the old lower_bound_plus_injury knob with
  # the silent-treatment knob; injury credit already lives inside lower_bound_s in s05.)
  conservative_injury_estimate_s: 30

counterfactual:
  seed: 20260615
  n_bootstrap: 1000
  # Headline counterfactual window (IMPL-6, ADR-0019). The metric is closed-form
  # "P(>=1 extra goal in the omitted stoppage)" summed over half-windows h: mu = sum_h
  # lambda_h * omitted_live_h; P(change) = 1 - exp(-mu); X% = mean over matches. No Monte
  # Carlo (deterministic central estimate; seed is only for the CI bootstrap). The headline
  # window pools both added-time windows (">=1 extra goal anywhere"); "2H_only" is reported
  # alongside as a comparison.
  headline_window: "1H+2H"
  # knob grids (each combination is a row in the sensitivity grid)
  # Silent-treatment knob (IMPL-4): how much of the silent dead-time bucket is credited as
  # ADDABLE stoppage. silent_none = hard lower bound (lb only); silent_marked = the IMPL-3
  # marker-gated central estimate (lb + silent_marked_s + window-scaled residual); silent_all
  # = ungated over-counting upper bound (lb + silent_all_s).
  # LOCK (ADR-0025): silent_marked is a SINGLE calibrated estimate (calibrated to Nate WC2018)
  # and is the only level reported -- as a POINT, never a range. silent_none/all are known-wrong
  # bounds kept ONLY as internal monotonicity guardrails (test_s08_silent_knob_brackets_headline);
  # they are NOT a reported sensitivity axis. Reported model uncertainty = sampling CI + the
  # legitimate knobs (lambda-source, decay half-life, gross-up, conditioning).
  true_stoppage_knobs:
    - silent_none
    - silent_marked
    - silent_all
  # team_role dropped in IMPL-6 (ADR-0019): it existed only to pick WHICH team scores for the
  # W/D/L flip; the any-extra-goal metric uses only the two-team total rate, so role is moot.
  lambda_conditioning_knobs:
    - overall
    - tied_nontied
  # pooled_all (PRE+POST) is the IMPL-6 central source (ADR-0019): no first-principles reason
  # goals-per-live-minute differs pre/post, and the data agrees within Poisson noise. pre/post
  # and regime_matched are kept as reported sensitivities.
  lambda_source_knobs:
    - pooled_all
    - pooled_pre
    - pooled_post
    - regime_matched
  # Omitted-time productivity DECAY half-life, minutes (IMPL-8, ADR-0024; Method A). Replaces the
  # binary productivity_premium rail. Counterfactual (unobserved) added 2H minutes should NOT
  # inherit the full end-game urgency premium: the observed 2H-stoppage lambda (0.0816) is ~1.9x
  # the open-play floor (0.0427) only because it is measured over short, late, high-urgency
  # windows. So the per-minute 2H rate DECAYS from obs toward the open-play floor as the omitted
  # window grows: lambda(t) = floor + (obs-floor)*0.5**(t/h); a match with T omitted (grossed)
  # 2H clock-minutes gets the closed-form average avg_lambda(T,h) = floor + (obs-floor)*
  # (1-exp(-k*T))/(k*T), k=ln2/h. 1H is UNCHANGED (keeps observed 1H-stoppage lambda). The two
  # old rails ARE the limits: h->inf == `observed` (no decay), h->0 == `open_play` floor.
  # REPORTED uncertainty band = half-life [2,8] min; CENTRAL point = 4 min (user 2026-06-19).
  # .inf / 0.0 are kept ONLY to back the old two rails out exactly (regression + endpoint gate).
  productivity_decay_halflife_min:
    - .inf      # endpoint, regression only: = old `observed` rail (no decay)
    - 8.0       # REPORTED BAND CEILING (least decay -> highest X%)
    - 4.0       # CENTRAL (point estimate)
    - 2.0       # REPORTED BAND FLOOR (most decay -> lowest X%)
    - 0.0       # endpoint, regression only: = old `open_play` floor (instant decay)
  # In-stoppage time-wasting gross-up (IMPL-7 Part C, ADR-0021 #3 / O3). `off` = base model.
  # `on` grosses up the omitted CLOCK by the in-stoppage time-wasting that the added time itself
  # generates (one pass: factor 1 + time-wasting_rate, rate = 1 - live_share), then applies
  # productivity to the live portion. CENTRAL = `on` (IMPL-8 / ADR-0024): the directive's own
  # logic says stoppage time must compensate for the stoppages within it, so OFF leaves
  # in-stoppage time-wasting uncompensated. The full stoppage-within-stoppage fixed point is the
  # geometric ceiling 1/(1-r)=1/live_share (omitted_live == omitted_clock); s08 REPORTS it as the
  # true upper rail above single-pass `on` but it is not a swept knob. RAISES X% (no agenda).
  timewaste_grossup_knobs:
    - "off"
    - "on"

references:
  # External published numbers used as acceptance gates (documented, not derived).
  opta_wc2022_bip_s: 3484          # 58:04
  board_pre_mean_min: 7
  board_post_wc2022_mean_min: 11.5
  goals_after_90_wc2022_share: 0.125   # ~12-13% (538)
